<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sacha Pyaar Detector ⚠️</title>
    <style>
        body {
            background-color: #fce4ec;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            width: 350px;
            min-height: 450px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        #main-gif {
            width: 150px;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 1.4rem;
            color: #d81b60;
            margin-bottom: 20px;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            width: 100%;
            height: 60px;
            position: relative;
        }

        button {
            padding: 12px 25px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        #yesBtn {
            background-color: #4caf50;
            color: white;
            z-index: 10;
        }

        #noBtn {
            background-color: #f44336;
            color: white;
            position: relative; /* Shuruat mein dikhne ke liye */
            z-index: 5;
        }

        #status-msg {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #888;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            100% { transform: translate(1px, 1px) rotate(0deg); }
        }

        .shake { animation: shake 0.5s infinite; }
    </style>
</head>
<body>

    <div class="container" id="mainContainer">
        <img id="main-gif" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHpueXpueXpueXpueXpueXpueXpueXpueXpueXpueXpueXpueCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/cLS1cfxvGOPVpf9g3y/giphy.gif">
        
        <h1 id="questionText">Will you be my girlfriend? ❤️</h1>

        <div class="btn-container">
            <button id="yesBtn" onclick="accepted()">Yes</button>
            <button id="noBtn" onmouseover="funnyMove()" onclick="funnyMove()">No</button>
        </div>
        
        <p id="status-msg">Hint: Left wala button safe hai ✅</p>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const mainGif = document.getElementById('main-gif');
        const container = document.getElementById('mainContainer');

        let moveCount = 0;
        const jokes = [
            "Nahi degi? 😂",
            "Soch lo achhe se!",
            "Treat meri taraf se!",
            "Mummy ko bataunga!",
            "Phone tod dunga!",
            "Error: Dil broken 💔",
            "Try clicking Yes!",
            "Pakad ke dikhao!"
        ];

        function funnyMove() {
            moveCount++;
            
            // Mouse aate hi isko "fixed" kar do taaki ye container se bahar bhage
            noBtn.style.position = 'fixed';
            
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
            
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';

            // Funny text change
            noBtn.innerText = jokes[moveCount % jokes.length];

            // Yes button ko bada karo
            let scale = 1 + (moveCount * 0.15);
            yesBtn.style.transform = `scale(${scale})`;

            if(moveCount > 5) container.classList.add('shake');
        }

        function accepted() {
            container.innerHTML = `
<img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHpueXpueXpueXpueXpueXpueXpueXpueXpueXpueXpueXpueCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/cLS1cfxvGOPVpf9g3y/giphy.gif"
                <h1 style="color: #ff4d6d;">Mubarak Ho! 🥰</h1>
                <p>Ab dosti khatam, naya kalesh shuru! 😂❤️</p>
            `;
            document.body.style.backgroundColor = "#ffc1e3";
            setInterval(() => spawnEmoji('❤️'), 200);
        }

        function spawnEmoji(emoji) {
            const e = document.createElement('div');
            e.innerText = emoji;
            e.style.position = 'fixed';
            e.style.left = Math.random() * 100 + 'vw';
            e.style.top = '110vh';
            e.style.fontSize = '30px';
            e.style.transition = '2s';
            e.style.animation = `floatUp 3s linear forwards`;
            document.body.appendChild(e);
            setTimeout(() => e.remove(), 3000);
        }
    </script>

    <style>
        @keyframes floatUp {
            to { transform: translateY(-120vh) rotate(360deg); opacity: 0; }
        }
    </style>
</body>
</html>
