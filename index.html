<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urgent Question! ⚠️</title>
    <style>
        body {
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            overflow: hidden;
            transition: background 0.3s;
        }

        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            max-width: 450px;
            position: relative;
        }

        #main-gif {
            width: 200px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        h1 {
            color: #333;
            font-size: 1.8rem;
            margin-bottom: 30px;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            height: 100px;
        }

        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
        }

        #yesBtn {
            background-color: #2ecc71;
            color: white;
            z-index: 1000;
        }

        #noBtn {
            background-color: #e74c3c;
            color: white;
            position: absolute;
        }

        .success-msg {
            display: none;
        }
    </style>
</head>
<body>

    <div class="container" id="mainContainer">
        <img id="main-gif" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHpueXpueXpueXpueXpueXpueXpueXpueXpueXpueXpueXpueCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/cLS1cfxvGOPVpf9g3y/giphy.gif" alt="Asking">
        
        <h1 id="questionText">Will you be my girlfriend? <br> (Choose wisely, I know where you live 👁️👄👁️)</h1>

        <div class="btn-container">
            <button id="yesBtn" onclick="accepted()">Yes</button>
            <button id="noBtn" onmouseover="moveAndChange()">No</button>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const mainGif = document.getElementById('main-gif');
        const questionText = document.getElementById('questionText');

        let noClickCount = 0;
        const funnyTexts = [
            "Are you sure?", 
            "Think again!", 
            "Paisa dunga!", 
            "I'll tell your mom!", 
            "Ek baar aur soch lo...", 
            "Galat button hai ye!", 
            "Dil tod diya mera 💔",
            "Bhagwan dekh raha hai"
        ];

        function moveAndChange() {
            // 1. Make the button run away
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;

            // 2. Change the text of No button
            const randomText = funnyTexts[Math.floor(Math.random() * funnyTexts.length)];
            noBtn.innerText = randomText;

            // 3. Make the YES button grow bigger (Subliminal messaging lol)
            noClickCount++;
            let newSize = 1 + (noClickCount * 0.2);
            yesBtn.style.transform = `scale(${newSize})`;
            
            // 4. Change GIF to something sadder
            if(noClickCount === 5) {
                mainGif.src = "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHpueXpueXpueXpueXpueXpueXpueXpueXpueXpueXpueXpueCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/9Y5BbDSkSTiY8/giphy.gif";
            }
        }

        function accepted() {
            document.getElementById('mainContainer').innerHTML = `
                <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHpueXpueXpueXpueXpueXpueXpueXpueXpueXpueXpueXpueCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/T86lbVQOQDsQY4GkZ3/giphy.gif" style="width:250px; border-radius:20px;">
                <h1 style="color: #ff4d6d;">Hehe, I knew it! ❤️</h1>
                <p>Ab party kab hai? 🎉</p>
                <button onclick="location.reload()" style="background:#888; color:white; font-size:12px; padding:5px 10px;">Reset (In case you want to say Yes again)</button>
            `;
            document.body.style.backgroundColor = "#ffdae0";
            
            // Confetti effect
            for(let i=0; i<100; i++) { createEmoji('💖'); createEmoji('🍕'); }
        }

        function createEmoji(emoji) {
            const el = document.createElement('div');
            el.innerHTML = emoji;
            el.style.position = 'fixed';
            el.style.left = Math.random() * 100 + 'vw';
            el.style.top = '100vh';
            el.style.fontSize = '25px';
            el.style.animation = `float ${Math.random() * 2 + 3}s linear forwards`;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 4000);
        }
    </script>

    <style>
        @keyframes float {
            to { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }
    </style>

</body>
</html>
